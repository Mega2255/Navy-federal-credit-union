<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Navy Federal – Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --navy: #002147;
      --navy-mid: #003366;
      --teal: #00857C;
      --teal-light: #00A896;
      --gold: #C9A84C;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #0a0f18;
      color: rgba(255,255,255,.9);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background grid */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,133,124,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,133,124,.04) 1px, transparent 1px);
      background-size: 48px 48px;
      z-index: 0;
    }

    /* Glowing orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
      pointer-events: none;
    }
    .orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(0,133,124,.18) 0%, transparent 70%);
      top: -150px; left: -150px;
      animation: drift1 12s ease-in-out infinite alternate;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(201,168,76,.12) 0%, transparent 70%);
      bottom: -100px; right: -100px;
      animation: drift2 14s ease-in-out infinite alternate;
    }
    .orb-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(0,33,71,.4) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    @keyframes drift1 { from { transform: translate(0,0); } to { transform: translate(60px, 40px); } }
    @keyframes drift2 { from { transform: translate(0,0); } to { transform: translate(-40px, -60px); } }

    /* Scan line effect */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,.03) 2px,
        rgba(0,0,0,.03) 4px
      );
      z-index: 1;
      pointer-events: none;
    }

    /* Login card */
    .login-wrap {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 1rem;
      animation: slideUp .6s cubic-bezier(.4,0,.2,1) forwards;
      opacity: 0;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-card {
      background: linear-gradient(145deg, #111827, #0d1520);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow:
        0 0 0 1px rgba(0,133,124,.1),
        0 40px 80px rgba(0,0,0,.6),
        inset 0 1px 0 rgba(255,255,255,.05);
      position: relative;
      overflow: hidden;
    }

    /* Card shimmer top border */
    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--teal), var(--gold), var(--teal), transparent);
      opacity: .6;
    }

    /* Corner accent */
    .login-card::after {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 160px; height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,.08) 0%, transparent 70%);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: .85rem;
      margin-bottom: 2rem;
    }
    .brand-icon {
      width: 48px; height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(0,33,71,.8), rgba(0,51,102,.8));
      border: 1px solid rgba(201,168,76,.25);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,.4);
    }
    .brand-text .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: .95rem;
      font-weight: 700;
      color: white;
      letter-spacing: .04em;
    }
    .brand-text .brand-sub {
      font-size: .6rem;
      letter-spacing: .22em;
      color: var(--gold);
      font-weight: 600;
      margin-top: 1px;
    }

    .login-headline {
      margin-bottom: .5rem;
    }
    .login-headline h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: white;
      line-height: 1.2;
    }
    .login-headline p {
      font-size: .82rem;
      color: rgba(255,255,255,.38);
      margin-top: .4rem;
      letter-spacing: .01em;
    }

    /* Security badge */
    .security-badge {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      background: rgba(0,133,124,.08);
      border: 1px solid rgba(0,133,124,.2);
      border-radius: 99px;
      padding: .3rem .75rem;
      font-size: .68rem;
      font-weight: 600;
      color: var(--teal-light);
      letter-spacing: .06em;
      margin-bottom: 1.75rem;
    }
    .security-badge .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--teal-light);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .4; transform: scale(.7); }
    }

    /* Form fields */
    .field-group {
      margin-bottom: 1.1rem;
    }
    .field-label {
      font-size: .72rem;
      font-weight: 600;
      color: rgba(255,255,255,.4);
      letter-spacing: .08em;
      margin-bottom: .45rem;
      display: block;
    }
    .field-wrap {
      position: relative;
    }
    .field-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,.25);
      pointer-events: none;
    }
    .field-input {
      width: 100%;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 12px;
      padding: .8rem 1rem .8rem 2.75rem;
      color: white;
      font-size: .88rem;
      font-family: 'DM Sans', sans-serif;
      transition: border-color .2s, background .2s, box-shadow .2s;
      outline: none;
    }
    .field-input:focus {
      border-color: rgba(0,133,124,.5);
      background: rgba(0,133,124,.05);
      box-shadow: 0 0 0 3px rgba(0,133,124,.1);
    }
    .field-input::placeholder { color: rgba(255,255,255,.2); }

    /* Password toggle */
    .pass-toggle {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,.25);
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      transition: color .2s;
    }
    .pass-toggle:hover { color: rgba(255,255,255,.6); }

    /* Error message */
    .error-msg {
      display: none;
      background: rgba(220,53,69,.1);
      border: 1px solid rgba(220,53,69,.25);
      border-radius: 10px;
      padding: .75rem 1rem;
      font-size: .8rem;
      color: #ff6b7a;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: .6rem;
    }
    .error-msg.hidden { display: none; }

    /* Submit button */
    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, var(--teal), var(--teal-light));
      color: white;
      font-weight: 700;
      font-size: .92rem;
      font-family: 'DM Sans', sans-serif;
      border: none;
      border-radius: 12px;
      padding: .9rem 1.5rem;
      cursor: pointer;
      letter-spacing: .02em;
      transition: all .25s;
      position: relative;
      overflow: hidden;
      margin-top: 1.5rem;
    }
    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.12), transparent);
      opacity: 0;
      transition: opacity .2s;
    }
    .btn-login:hover::before { opacity: 1; }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(0,133,124,.4); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled {
      opacity: .6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-login .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-login.loading .btn-text { display: none; }
    .btn-login.loading .spinner { display: block; }

    /* Footer */
    .login-footer {
      margin-top: 1.75rem;
      padding-top: 1.25rem;
      border-top: 1px solid rgba(255,255,255,.06);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
    }
    .login-footer .lock-icon { color: rgba(255,255,255,.2); }
    .login-footer p {
      font-size: .7rem;
      color: rgba(255,255,255,.25);
      text-align: center;
      letter-spacing: .03em;
    }
    .login-footer span { color: var(--gold); font-weight: 600; }

    /* Shake animation for wrong password */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-6px); }
      40%       { transform: translateX(6px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }
    .shake { animation: shake .4s ease; }

    @media (max-width: 480px) {
      .login-card { padding: 1.75rem 1.5rem; border-radius: 20px; }
      .login-headline h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="login-wrap">
  <div class="login-card" id="loginCard">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">
        <svg width="26" height="26" viewBox="0 0 60 60" fill="none">
          <circle cx="30" cy="12" r="7" stroke="#C9A84C" stroke-width="2.5"/>
          <line x1="30" y1="19" x2="30" y2="52" stroke="#00A896" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M16 38 Q30 52 44 38" stroke="#00A896" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <circle cx="16" cy="38" r="3" fill="#C9A84C"/>
          <circle cx="44" cy="38" r="3" fill="#C9A84C"/>
        </svg>
      </div>
      <div class="brand-text">
        <div class="brand-name">Admin Console</div>
        <div class="brand-sub">NAVY FEDERAL</div>
      </div>
    </div>

    <!-- Headline -->
    <div class="login-headline">
      <h1>Secure Access</h1>
      <p>Restricted to authorized administrators only</p>
    </div>

    <!-- Security badge -->
    <div class="security-badge">
      <div class="dot"></div>
      ENCRYPTED SESSION
    </div>

    <!-- Error -->
    <div class="error-msg hidden" id="errorMsg">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="errorText">Invalid credentials</span>
    </div>

    <!-- Form -->
    <div class="field-group">
      <label class="field-label" for="adminEmail">EMAIL ADDRESS</label>
      <div class="field-wrap">
        <svg class="field-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
        <input
          class="field-input"
          id="adminEmail"
          type="email"
          placeholder="admin@navyfederal.org"
          autocomplete="email"
          required
        />
      </div>
    </div>

    <div class="field-group">
      <label class="field-label" for="adminPassword">PASSWORD</label>
      <div class="field-wrap">
        <svg class="field-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input
          class="field-input"
          id="adminPassword"
          type="password"
          placeholder="Enter your password"
          autocomplete="current-password"
          required
        />
        <button class="pass-toggle" id="passToggle" type="button" onclick="togglePass()">
          <svg id="eyeOpen" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg id="eyeClosed" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:none">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn-login" id="loginBtn">
      <span class="btn-text">Access Admin Panel</span>
      <div class="spinner"></div>
    </button>

    <!-- Footer -->
    <div class="login-footer">
      <svg class="lock-icon" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <p>Access is logged and monitored · <span>256-bit SSL</span></p>
    </div>

  </div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD_yrAE0WCnNPjc_2FZ4ZhLG2AJRFA6V2c",
    authDomain: "navy-credit-union-2f63d.firebaseapp.com",
    databaseURL: "https://navy-credit-union-2f63d-default-rtdb.firebaseio.com",
    projectId: "navy-credit-union-2f63d",
    storageBucket: "navy-credit-union-2f63d.firebasestorage.app",
    messagingSenderId: "176577787303",
    appId: "1:176577787303:web:7281f340b470daeb45f282"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getDatabase(app);

  // Always sign out any existing session when the admin login page loads,
  // so every visit requires fresh credentials.
  signOut(auth);

  async function handleLogin() {
    const email    = document.getElementById('adminEmail').value.trim();
    const password = document.getElementById('adminPassword').value;
    const btn      = document.getElementById('loginBtn');
    const errBox   = document.getElementById('errorMsg');
    const errText  = document.getElementById('errorText');

    // Basic validation
    if (!email || !password) {
      showError('Please enter your email and password.');
      return;
    }

    // Loading state
    btn.classList.add('loading');
    btn.disabled = true;
    errBox.classList.add('hidden');

    try {
      const cred = await signInWithEmailAndPassword(auth, email, password);
      const snap = await get(ref(db, `users/${cred.user.uid}/role`));

      if (snap.val() !== 'admin') {
        // Signed in but not an admin — sign out and reject
        await auth.signOut();
        showError('Access denied. This account does not have admin privileges.');
        return;
      }

      // All good — redirect
      window.location.href = 'admin.html';

    } catch (err) {
      let msg = 'Login failed. Please try again.';
      if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
        msg = 'Invalid email or password. Please try again.';
      } else if (err.code === 'auth/too-many-requests') {
        msg = 'Too many failed attempts. Account temporarily locked.';
      } else if (err.code === 'auth/network-request-failed') {
        msg = 'Network error. Please check your connection.';
      }
      showError(msg);
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  };

  function showError(msg) {
    const errBox  = document.getElementById('errorMsg');
    const errText = document.getElementById('errorText');
    const card    = document.getElementById('loginCard');
    errText.textContent = msg;
    errBox.classList.remove('hidden');
    card.classList.remove('shake');
    void card.offsetWidth; // trigger reflow
    card.classList.add('shake');
    setTimeout(() => card.classList.remove('shake'), 500);
  }

  // Allow Enter key to submit + button click
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('loginBtn')?.addEventListener('click', handleLogin);
    ['adminEmail', 'adminPassword'].forEach(id => {
      document.getElementById(id)?.addEventListener('keydown', e => {
        if (e.key === 'Enter') handleLogin();
      });
    });
  });

  window.togglePass = function() {
    const input = document.getElementById('adminPassword');
    const open  = document.getElementById('eyeOpen');
    const shut  = document.getElementById('eyeClosed');
    if (input.type === 'password') {
      input.type = 'text';
      open.style.display  = 'none';
      shut.style.display  = 'block';
    } else {
      input.type = 'password';
      open.style.display  = 'block';
      shut.style.display  = 'none';
    }
  };
</script>

</body>
</html>
